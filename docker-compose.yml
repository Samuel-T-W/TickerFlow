services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  init-kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - kafka
    entrypoint: [ '/bin/sh', '-c' ]
    command: |
      "
      # blocks until kafka is reachable
      kafka-topics --bootstrap-server kafka:29092 --list

      echo -e 'Creating kafka topic...'
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ticker_events --replication-factor 1 --partitions 1

      echo -e 'Successfully created the topic.'
      "

  app:
    build: .
    container_name: tickerflow_app
    depends_on:
      - init-kafka
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    command: poetry run python -m src.backend.tickerflow

  jobmanager:
    build:
      context: .
      dockerfile: flink.Dockerfile
    container_name: flink_jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        parallelism.default: 1
    volumes:
      - ./src/backend/flink:/app/flink:ro
    depends_on:
      - kafka

  taskmanager:
    build:
      context: .
      dockerfile: flink.Dockerfile
    container_name: flink_taskmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 1
    depends_on:
      - jobmanager
    volumes:
      - ./src/backend/flink:/app/flink:ro

  flink-job:
    build:
      context: .
      dockerfile: flink.Dockerfile
    container_name: flink_job_submitter
    depends_on:
      - jobmanager
    volumes:
      - ./src/backend/flink:/app/flink:ro
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        rest.address: jobmanager
        parallelism.default: 1
    command: >
      bash -c "
        # Wait for JobManager to be ready
        until curl -s http://jobmanager:8081/overview | grep -q '\"taskmanagers\":1'; do
          echo 'Waiting for JobManager and at least one TaskManager...'
          sleep 5
        done
        
        # Now submit the job (the entrypoint of the image)
        /opt/flink/bin/flink run -m jobmanager:8081 -py /app/flink/highest_price.py
      "

  kafdrop:
    image: obsidiandynamics/kafdrop
    container_name: kafdrop
    ports:
      - "19000:9000"
    environment:
      KAFKA_BROKERCONNECT: "kafka:29092"
    depends_on:
      - kafka
